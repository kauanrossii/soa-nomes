<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>

    <title>Document</title>
  </head>
  <body>
    <div style="width: 100vh; height: 100vh">
      <canvas id="chart-ranking-name-by-decade"></canvas>
    </div>
    <script>
      let nameDataByDecade = null;

      async function getDataByName(name) {
        const response = await fetch(
          `https://servicodados.ibge.gov.br/api/v2/censos/nomes/${name}`
        );
        const json = await response.json();
        console.log(json);
        nameDataByDecade = json[0].res;

        const canvasElement = document.getElementById(
          "chart-ranking-name-by-decade"
        );

        new Chart(canvasElement, {
          type: "line",
          labels: ["1970", "1980", "1990", "2000", "2010"],
          data: {
            datasets: [
              {
                label: "Kauan",
                data: nameDataByDecade.map((period) => {
                  return period.frequencia.toString();
                }),
                fill: true,
                tension: 0.1,
                borderColor: "rgb(75, 192, 192)",
              },
            ],
          },
        });
      }

      getDataByName("Kauan");
    </script>
  </body>
</html>
